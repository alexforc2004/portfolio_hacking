<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Cyberpunk Grid Background -->
  <g stroke="rgba(255,0,51,0.1)" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="350" x2="400" y2="350"/>
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
  </g>
  
  <!-- Central Circle with Initials -->
  <circle cx="200" cy="200" r="120" fill="rgba(255,0,51,0.1)" stroke="url(#neonGradient)" stroke-width="3"/>
  
  <!-- Initials -->
  <text x="200" y="220" font-family="Orbitron, monospace" font-size="80" font-weight="bold" fill="#ff0033" text-anchor="middle" letter-spacing="5">AO</text>
  
  <!-- Decorative Elements -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,0,51,0.2)" stroke-width="1" stroke-dasharray="5,5"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="rgba(255,0,51,0.1)" stroke-width="1"/>
  
  <!-- Corner Accents -->
  <rect x="20" y="20" width="30" height="30" fill="none" stroke="#ff0033" stroke-width="2"/>
  <rect x="350" y="20" width="30" height="30" fill="none" stroke="#ff0033" stroke-width="2"/>
  <rect x="20" y="350" width="30" height="30" fill="none" stroke="#ff0033" stroke-width="2"/>
  <rect x="350" y="350" width="30" height="30" fill="none" stroke="#ff0033" stroke-width="2"/>
  
  <!-- Cyberpunk Text -->
  <text x="200" y="350" font-family="Share Tech Mono, monospace" font-size="12" fill="rgba(255,0,51,0.6)" text-anchor="middle">AZZEDINE.DEV</text>
</svg>